common:
  - type: Website
    url: https://www.benchmarkminerals.com
  - type: Portal
    url: https://source.benchmarkminerals.com
    title: Benchmark Source Data Platform
  - type: Pricing
    url: https://www.benchmarkminerals.com/all-prices-subscription
    title: Price Data Subscriptions
  - type: Features
    data:
      - name: Price Assessments
        description: >-
          IOSCO Type 2 assured benchmark price assessments for lithium, nickel,
          cobalt, graphite, rare earths, permanent magnets, and battery cells,
          used as reference prices in supply contracts and financial instruments.
      - name: Supply Chain Data
        description: >-
          Comprehensive mine-to-grid supply chain databases covering raw material
          mining, processing, cell manufacturing, and gigafactory capacity across
          lithium ion and sodium ion battery chemistries.
      - name: Market Forecasts
        description: >-
          Long-term supply and demand forecasts for critical battery materials
          and electric vehicle adoption, tracking policy shifts, capacity expansions,
          and technology transitions.
      - name: Gigafactory Intelligence
        description: >-
          Global tracking of battery gigafactory capacity, ownership, operating
          status, production volumes, and technology transitions for lithium ion
          and next-generation battery chemistries.
      - name: API Data Integration
        description: >-
          Enterprise API access enables subscribers to integrate Benchmark price
          data and supply chain databases directly into business intelligence
          platforms, ERP systems, and procurement workflows.
      - name: Price Dashboard
        description: >-
          Interactive price dashboard providing real-time access to benchmark
          prices, historical price charts, and data visualization for energy
          transition materials.
  - type: UseCases
    data:
      - name: Supply Chain Procurement
        description: >-
          Battery manufacturers and EV OEMs use Benchmark price data as reference
          benchmarks in raw material supply contracts and procurement negotiations
          for lithium, nickel, cobalt, and graphite.
      - name: Investment and Financial Analysis
        description: >-
          Investors, banks, and financial institutions use Benchmark forecasts and
          price data to evaluate mining projects, battery companies, and energy
          transition investment opportunities.
      - name: Strategic Planning
        description: >-
          Corporate strategy teams and policy makers use Benchmark supply chain
          databases and forecasts to plan capacity investments and assess raw
          material availability for battery manufacturing programs.
      - name: Risk Management
        description: >-
          Supply chain managers use Benchmark price data and market intelligence
          to identify supply risks, monitor market conditions, and develop
          hedging strategies for critical mineral exposure.
  - type: Integrations
    data:
      - name: Business Intelligence Platforms
        description: >-
          Benchmark API integrates with BI tools and data analytics platforms
          to embed price data and supply chain metrics in custom dashboards
          and reporting workflows.
      - name: ERP Systems
        description: >-
          Enterprise API access enables integration of Benchmark benchmark prices
          into ERP and procurement systems for automated contract indexing and
          raw material cost tracking.
