    description: >-
      The Benchmark Minerals API provides programmatic access to price data,
      supply chain data, and market intelligence for the lithium-ion battery
      and critical minerals supply chain. API keys are available to enterprise
      subscribers, enabling integration of benchmark prices, forecasts, and
      supply chain databases into business intelligence and procurement systems.
    properties:
